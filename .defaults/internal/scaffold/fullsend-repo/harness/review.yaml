---
agent: agents/review.md
doc: docs/agents/review.md
model: opus
image: ghcr.io/fullsend-ai/fullsend-code:latest
policy: policies/base.yaml
providers:
  - vertex-ai
  - github-ro
readonly_repo: true

role: review
slug: fullsend-ai-review

skills:
  - skills/pr-review
  - skills/code-review
  - skills/docs-review
  - skills/issue-labels

host_files:
  - src: env/gcp-vertex.env
    dest: /sandbox/workspace/.env.d/gcp-vertex.env
    expand: true
  - src: ${GOOGLE_APPLICATION_CREDENTIALS}
    dest: /tmp/.gcp-credentials.json
  - src: ${GCP_OIDC_TOKEN_FILE}
    dest: /sandbox/workspace/.gcp-oidc-token
    optional: true
  - src: ${PRIOR_REVIEW_FILE}
    dest: /sandbox/workspace/prior-review.txt
    optional: true

pre_script: scripts/pre-review.sh
post_script: scripts/post-review.sh

validation_loop:
  script: scripts/validate-output-schema.sh
  max_iterations: 2

env:
  runner:
    FULLSEND_OUTPUT_SCHEMA: ${FULLSEND_DIR}/schemas/review-result.schema.json
  sandbox:
    PRIOR_REVIEW_SHA: "${PRIOR_REVIEW_SHA}"
    PRIOR_REVIEW_PROVENANCE: "${PRIOR_REVIEW_PROVENANCE}"
    REVIEW_FINDING_SEVERITY_THRESHOLD: "${REVIEW_FINDING_SEVERITY_THRESHOLD}"

timeout_minutes: 20

forge:
  github:
    pre_script: scripts/pre-review.sh
    post_script: scripts/post-review.sh
    env:
      runner:
        REVIEW_TOKEN: "${REVIEW_TOKEN}"
        REPO_FULL_NAME: "${REPO_FULL_NAME}"
        PR_NUMBER: "${PR_NUMBER}"
        GITHUB_PR_URL: "${GITHUB_PR_URL}"
      sandbox:
        GITHUB_PR_URL: "${GITHUB_PR_URL}"
        GH_TOKEN: "${GH_TOKEN}"
        PR_NUMBER: "${PR_NUMBER}"
        REPO_FULL_NAME: "${REPO_FULL_NAME}"
