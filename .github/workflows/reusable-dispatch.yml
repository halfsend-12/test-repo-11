# Reusable dispatch workflow for per-repo installation mode.
# Routes events to the appropriate stage and runs the agent inline.
# This is the per-repo equivalent of the per-org dispatch.yml + thin caller pair.
#
# ADR 62: Stage workflows are inlined into this file to avoid version skew.
# Per-repo mode previously referenced reusable-{stage}.yml@v0 via uses: lines,
# which hardcoded @v0 and didn't pick up dev changes. Inlining eliminates the
# second workflow_call hop. Standalone reusable-{stage}.yml files are kept for
# per-org mode until it's removed (ADR 44).
#
# Concurrency: each stage job declares a per-role cancel-in-progress group
# (fullsend-{stage}-…). Roles operate independently — review dispatches do
# not cancel triage, code, fix, etc.
#
# Flow: shim (per-repo) → reusable-dispatch.yml (route + inlined stage logic)
# Nesting: 2 levels of workflow_call (previously 3 before inlining)
#
# Security: all user-controlled inputs (comment body, labels, usernames)
# are passed via env: variables, not interpolated in run: blocks.
name: Dispatch

on:
  workflow_call:
    inputs:
      event_action:
        description: "The event action (github.event.action) forwarded by the shim"
        required: true
        type: string
      install_mode:
        description: "Installation mode: per-repo (default) or per-org"
        required: false
        type: string
        default: "per-repo"
      mint_url:
        description: "Token mint URL for OIDC token exchange"
        required: true
        type: string
      gcp_region:
        description: "GCP region for Vertex AI"
        required: true
        type: string
      fullsend_version:
        description: "Fullsend CLI version to use"
        required: false
        type: string
        default: "latest"
      fullsend_ai_ref:
        description: "Deprecated: stage workflows now use job.workflow_sha. Kept so existing shims that pass this input do not break."
        type: string
        required: false
        default: v0
      project_number:
        description: "GitHub Projects V2 project number for RICE scoring (prioritize agent)"
        required: false
        type: string
        default: ""
      runner_image:
        description: GitHub Actions runner image for agent jobs.
        type: string
        required: false
        default: "ubuntu-24.04"
    secrets:
      FULLSEND_GCP_WIF_PROVIDER:
        required: false
      FULLSEND_GCP_PROJECT_ID:
        required: true
      OTEL_EXPORTER_OTLP_TRACES_HEADERS:
        description: >-
          OTLP headers for ADR 0050 Level 2 trace export, forwarded to the
          triage stage (baggage-style k=v,k=v; may carry auth, hence a
          secret). Optional — unset leaves export disabled unless the
          endpoint variable alone suffices.
        required: false

jobs:
  route:
    name: Route
    runs-on: ${{ inputs.runner_image }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      stage: ${{ steps.role-check.outputs.skipped != 'true' && steps.agent-check.outputs.skipped != 'true' && steps.pr-check.outputs.skipped != 'true' && steps.route.outputs.stage || '' }}
      trigger_source: ${{ steps.route.outputs.trigger_source }}
      event_payload: ${{ steps.payload.outputs.event_payload }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # checkout@v7 blocks fork PR checkouts on pull_request_target by
          # default. Safe here: only .fullsend/ config is read, no fork code
          # is executed, and credentials are not persisted. Pin to base branch
          # so kill-switch / role gating always reads trusted config.
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: ${{ github.event_name == 'pull_request_target' }}
          sparse-checkout: .fullsend/config.yaml
          sparse-checkout-cone-mode: false

      - name: Determine stage
        id: route
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ inputs.event_action }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER_TYPE: ${{ github.event.comment.user.type }}
          COMMENT_USER_LOGIN: ${{ github.event.comment.user.login }}
          COMMENT_AUTHOR_ASSOC: ${{ github.event.comment.author_association }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          ISSUE_IS_PR: ${{ github.event.issue.pull_request && 'true' || 'false' }}
          ISSUE_USER_LOGIN: ${{ github.event.issue.user.login }}
          EVENT_SENDER_LOGIN: ${{ github.event.sender.login }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_USER_LOGIN: ${{ github.event.review.user.login }}
          TRIGGERING_LABEL: ${{ github.event.label.name }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
          PR_USER_LOGIN: ${{ github.event.pull_request.user.login }}
          ORG_NAME: ${{ github.repository_owner }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          STAGE=""
          TRIGGER_SOURCE=""

          # Collaborator role_name vs min (write|triage). See #5223 / ADR 0054.
          # API resolves org membership regardless of visibility (gh-aw-mcpg#2862).
          has_repo_permission() {
            local username="${1:-}" min="${2:-write}" role api_err
            [[ -z "${username}" ]] && return 1
            api_err=$(mktemp) || {
              echo "::warning::Failed to create temp file for permission check of ${username}" >&2
              return 1
            }
            role=$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${username}/permission" \
              --jq '.role_name' 2>"${api_err}") || {
              echo "::warning::Permission API call failed for ${username}: $(cat "${api_err}")" >&2
              rm -f "${api_err}"
              return 1
            }
            rm -f "${api_err}"
            case "${role}" in
              admin|maintain|write) return 0 ;;
              triage) [[ "${min}" == "triage" ]] && return 0 || return 1 ;;
              *) return 1 ;;
            esac
          }

          has_write_permission() { has_repo_permission "${1:-}" write; }

          # Slash-command auth; optional $1 = write|triage (default write).
          is_authorized() {
            has_repo_permission "${COMMENT_USER_LOGIN}" "${1:-write}"
          }

          # Event-actor auth; $1=user, optional $2 = write|triage (default write).
          is_event_actor_authorized() {
            has_repo_permission "${1:-}" "${2:-write}"
          }

          is_issue_author() {
            [[ "${COMMENT_USER_LOGIN}" == "${ISSUE_USER_LOGIN}" ]]
          }

          has_label() {
            local needle="$1"
            local csv="${2:-${ISSUE_LABELS}}"
            IFS=',' read -ra labels <<< "${csv}"
            for l in "${labels[@]}"; do
              [[ "$l" == "$needle" ]] && return 0
            done
            return 1
          }

          COMMAND=""
          if [[ -n "${COMMENT_BODY:-}" ]]; then
            COMMAND="$(printf '%s\n' "${COMMENT_BODY}" | head -1 | tr -d '\r' | awk '{print $1}')"
          fi

          case "${EVENT_NAME}" in
            issue_comment)
              case "${COMMAND}" in
                /fs-triage)
                  if [[ "${COMMENT_USER_TYPE}" != "Bot" ]] && is_authorized triage; then
                    STAGE="triage"
                  fi
                  ;;
                /fs-code)
                  if [[ "${ISSUE_IS_PR}" == "false" ]]; then
                    if [[ "${COMMENT_USER_TYPE}" != "Bot" ]] && is_authorized; then
                      STAGE="code"
                    fi
                  fi
                  ;;
                /fs-review)
                  if [[ "${ISSUE_IS_PR}" == "true" ]]; then
                    if [[ "${COMMENT_USER_TYPE}" != "Bot" ]] && is_authorized triage; then
                      STAGE="review"
                    fi
                  fi
                  ;;
                /fs-fix)
                  if [[ "${ISSUE_IS_PR}" == "true" ]]; then
                    if [[ "${COMMENT_USER_TYPE}" != "Bot" ]] && is_authorized; then
                      STAGE="fix"
                      TRIGGER_SOURCE="${COMMENT_USER_LOGIN}"
                    fi
                  fi
                  ;;
                /fs-retro|/fullsend)
                  if [[ "${COMMENT_USER_TYPE}" != "Bot" ]] && is_authorized; then
                    if [[ "${COMMAND}" == "/fullsend" ]]; then
                      SECOND_WORD="$(printf '%s\n' "${COMMENT_BODY}" | head -1 | tr -d '\r' | awk '{print $2}')"
                      if [[ "${SECOND_WORD}" == "retro" ]]; then
                        STAGE="retro"
                      fi
                    else
                      STAGE="retro"
                    fi
                  fi
                  ;;
                /fs-prioritize)
                  if [[ "${COMMENT_USER_TYPE}" != "Bot" ]] && is_authorized; then
                    STAGE="prioritize"
                  fi
                  ;;
                *)
                  # Intentionally weaker gate: allows external reporters to
                  # re-trigger triage by providing clarification on needs-info
                  # issues. Full write-permission check is not required here.
                  if has_label "needs-info" && ! has_label "feature"; then
                    if [[ "${COMMENT_USER_TYPE}" != "Bot" ]]; then
                      if [[ "${COMMENT_AUTHOR_ASSOC}" != "NONE" ]] || is_issue_author; then
                        STAGE="triage"
                      fi
                    fi
                  fi
                  ;;
              esac
              ;;

            issues)
              if [[ "${EVENT_ACTION}" == "opened" ]]; then
                if is_event_actor_authorized "${ISSUE_USER_LOGIN}" triage; then
                  STAGE="triage"
                fi
              elif [[ "${EVENT_ACTION}" == "edited" ]]; then
                if is_event_actor_authorized "${EVENT_SENDER_LOGIN}" triage; then
                  STAGE="triage"
                fi
              elif [[ "${EVENT_ACTION}" == "labeled" ]]; then
                if [[ "${TRIGGERING_LABEL}" == "ready-for-triage" ]]; then
                  STAGE="triage"
                elif [[ "${TRIGGERING_LABEL}" == "ready-to-code" ]]; then
                  # Mutation stage: write+ labeler, or bots (agent handoff).
                  if [[ "${EVENT_SENDER_LOGIN}" =~ \[bot\]$ ]] || is_event_actor_authorized "${EVENT_SENDER_LOGIN}"; then
                    STAGE="code"
                  fi
                elif [[ "${TRIGGERING_LABEL}" == "ready-for-review" ]]; then
                  if [[ "${ISSUE_IS_PR}" == "true" ]]; then
                    STAGE="review"
                  fi
                fi
              fi
              ;;

            pull_request_target)
              case "${EVENT_ACTION}" in
                opened|synchronize|ready_for_review)
                  if is_event_actor_authorized "${PR_USER_LOGIN}" triage; then
                    STAGE="review"
                  fi
                  ;;
                labeled)
                  if [[ "${TRIGGERING_LABEL}" == "ready-for-review" ]]; then
                    STAGE="review"
                  fi
                  ;;
                closed)
                  # Intentional ungated: any closer may trigger read-only retro
                  # (lifecycle accounting). See ADR 0054 #5223 note.
                  STAGE="retro"
                  ;;
              esac
              ;;

            pull_request_review)
              if [[ "${EVENT_ACTION}" == "submitted" && "${REVIEW_STATE}" == "changes_requested" ]]; then
                REVIEW_BOT="${ORG_NAME}-review[bot]"
                if [[ "${REVIEW_USER_LOGIN}" == "${REVIEW_BOT}" ]]; then
                  # Human PRs need fullsend-fix + write+ author (not triage-only).
                  if [[ -n "${PR_HEAD_REPO}" && -n "${PR_BASE_REPO}" ]]; then
                    if [[ "${PR_HEAD_REPO}" == "${PR_BASE_REPO}" ]]; then
                      if ! has_label "fullsend-no-fix" "${PR_LABELS}"; then
                        if [[ "${PR_USER_LOGIN}" =~ \[bot\]$ ]]; then
                          STAGE="fix"
                          TRIGGER_SOURCE="${REVIEW_USER_LOGIN}"
                        elif has_label "fullsend-fix" "${PR_LABELS}" && has_repo_permission "${PR_USER_LOGIN}" write; then
                          STAGE="fix"
                          TRIGGER_SOURCE="${REVIEW_USER_LOGIN}"
                        fi
                      fi
                    fi
                  fi
                fi
              fi
              ;;
          esac

          if [[ -z "${STAGE}" ]]; then
            echo "No stage matched — skipping dispatch"
            echo "stage=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Routed to stage: ${STAGE}"
          echo "stage=${STAGE}" >> "${GITHUB_OUTPUT}"
          echo "trigger_source=${TRIGGER_SOURCE}" >> "${GITHUB_OUTPUT}"

      - name: Check for existing PRs
        id: pr-check
        if: steps.route.outputs.stage == 'code'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BOT_LOGIN="fullsend-ai[bot]"
          CODER_BOT_LOGIN="fullsend-ai-coder[bot]"
          MENTIONING_PRS="$(gh pr list --repo "${SOURCE_REPO}" --state open \
            --search "${ISSUE_NUMBER} in:title,body" \
            --json number,author \
            --jq "[.[] | select(.author.login != \"${BOT_LOGIN}\" and .author.login != \"${CODER_BOT_LOGIN}\")] | .[].number" \
            2>/dev/null || true)"
          if [[ -n "${MENTIONING_PRS}" ]]; then
            echo "::notice::Open PR(s) mentioning issue #${ISSUE_NUMBER} found — skipping code dispatch"
            echo "skipped=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate routed stage
        if: steps.route.outputs.stage != ''
        env:
          STAGE: ${{ steps.route.outputs.stage }}
          TRIGGER_SOURCE: ${{ steps.route.outputs.trigger_source }}
        run: |
          set -euo pipefail

          if [[ ! "$STAGE" =~ ^[a-z][a-z0-9_-]*$ ]]; then
            echo "::error::Invalid stage name: must start with lowercase letter and contain only [a-z0-9_-]"
            exit 1
          fi

          if [[ -n "${TRIGGER_SOURCE:-}" ]]; then
            if [[ ! "$TRIGGER_SOURCE" =~ ^[a-zA-Z0-9_-]+(\[bot\])?$ ]]; then
              echo "::error::Invalid trigger_source format: must be alphanumeric with optional [bot] suffix"
              exit 1
            fi
          fi

      - name: Check kill switch
        if: steps.route.outputs.stage != ''
        run: |
          set -euo pipefail
          if [[ -f .fullsend/config.yaml ]]; then
            KILL_SWITCH=$(yq '.kill_switch // false' .fullsend/config.yaml)
            if [[ "$KILL_SWITCH" == "true" ]]; then
              echo "::error::Kill switch is active — all agent dispatch halted"
              echo "::error::Set kill_switch: false in .fullsend/config.yaml to resume"
              exit 1
            fi
          fi

      - name: Validate agents config
        if: steps.route.outputs.stage != ''
        run: |
          set -euo pipefail
          if [[ ! -f .fullsend/config.yaml ]]; then
            exit 0
          fi
          AGENTS_TYPE=$(yq '.agents | type' .fullsend/config.yaml 2>/dev/null || echo "")
          case "$AGENTS_TYPE" in
            "!!null"|"") exit 0 ;;
            "!!seq") ;;
            *) echo "::error::config.yaml: 'agents' must be a list (got $AGENTS_TYPE)"; exit 1 ;;
          esac
          AGENT_COUNT=$(yq '.agents | length' .fullsend/config.yaml 2>/dev/null || echo "0")
          if [[ "$AGENT_COUNT" == "0" ]]; then
            exit 0
          fi
          BAD_DISABLED=$(yq '.agents[] | select(.enabled == false and (.name == null or .name == "")) | line' .fullsend/config.yaml 2>/dev/null || echo "")
          if [[ -n "$BAD_DISABLED" ]]; then
            echo "::error::config.yaml: disabled agent entry without a name field — add 'name:' to identify which agent to disable"
            exit 1
          fi
          BAD_SOURCE=$(yq '.agents[] | select(type == "!!map" and .enabled != false and (.source == null or .source == "")) | line' .fullsend/config.yaml 2>/dev/null || echo "")
          if [[ -n "$BAD_SOURCE" ]]; then
            echo "::error::config.yaml: enabled agent entry without a source field"
            exit 1
          fi
          DUPES_ENABLED=$(yq '.agents[] | select(type == "!!map" and .enabled != false) | (.name // "") | select(. != "") | downcase' .fullsend/config.yaml 2>/dev/null | sort | uniq -d)
          DUPES_DISABLED=$(yq '.agents[] | select(type == "!!map" and .enabled == false) | (.name // "") | select(. != "") | downcase' .fullsend/config.yaml 2>/dev/null | sort | uniq -d)
          if [[ -n "$DUPES_ENABLED" ]]; then
            echo "::error::config.yaml: duplicate enabled agent name(s): ${DUPES_ENABLED}"
            exit 1
          fi
          if [[ -n "$DUPES_DISABLED" ]]; then
            echo "::error::config.yaml: duplicate disabled agent name(s): ${DUPES_DISABLED}"
            exit 1
          fi

      - name: Check role is enabled
        id: role-check
        if: steps.route.outputs.stage != ''
        env:
          STAGE: ${{ steps.route.outputs.stage }}
        run: |
          set -euo pipefail
          if [[ ! -f .fullsend/config.yaml ]]; then
            exit 0
          fi
          STAGE_ROLE="$STAGE"
          case "$STAGE" in
            code|fix) STAGE_ROLE="coder" ;;
          esac
          ROLES=$(yq '.roles[]' .fullsend/config.yaml 2>/dev/null || echo "")
          if [[ -n "$ROLES" ]] && ! echo "$ROLES" | grep -Fqx "$STAGE_ROLE"; then
            # Backward compat: "fullsend" in roles implies retro + prioritize
            if [[ "$STAGE" =~ ^(retro|prioritize)$ ]] && echo "$ROLES" | grep -Fqx "fullsend"; then
              echo "::notice::Stage '$STAGE' allowed via 'fullsend' role — if customizing roles, add '$STAGE' explicitly"
            else
              echo "::notice::Stage '$STAGE' skipped — role '$STAGE_ROLE' not in configured roles"
              echo "skipped=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

      - name: Check agent is enabled
        id: agent-check
        if: steps.route.outputs.stage != '' && steps.role-check.outputs.skipped != 'true' && steps.pr-check.outputs.skipped != 'true'
        env:
          STAGE: ${{ steps.route.outputs.stage }}
        run: |
          set -euo pipefail
          if [[ ! -f .fullsend/config.yaml ]]; then
            exit 0
          fi
          YQ_ERR=$(mktemp)
          AGENT_ENABLED=$(yq "
            .agents[] |
            select((.name | downcase) == \"$STAGE\") |
            .enabled
          " .fullsend/config.yaml 2>"$YQ_ERR" | tail -1) || {
            echo "::warning::yq failed checking agents[].enabled — see logs"
            cat "$YQ_ERR" >&2
            rm -f "$YQ_ERR"
            exit 0
          }
          rm -f "$YQ_ERR"
          if [[ "$AGENT_ENABLED" == "false" ]]; then
            echo "::notice::Stage '$STAGE' skipped — agent '$STAGE' is disabled in config"
            echo "skipped=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

      - name: Resolve PR head for issue_comment events
        id: pr-head
        if: steps.route.outputs.stage != '' && steps.role-check.outputs.skipped != 'true' && steps.agent-check.outputs.skipped != 'true' && steps.pr-check.outputs.skipped != 'true' && github.event_name == 'issue_comment' && github.event.issue.pull_request
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          STAGE: ${{ steps.route.outputs.stage }}
        run: |
          set -euo pipefail
          PR_JSON=$(gh api "repos/${SOURCE_REPO}/pulls/${PR_NUMBER}" \
            --jq '{number, html_url,
              head: {ref: .head.ref, sha: .head.sha, repo: {full_name: .head.repo.full_name}},
              base: {ref: .base.ref, repo: {full_name: .base.repo.full_name}}}') || {
            if [[ "${STAGE}" =~ ^(fix|review)$ ]]; then
              echo "::error::Failed to fetch PR #${PR_NUMBER} head info"
              exit 1
            fi
            echo "::warning::Failed to fetch PR #${PR_NUMBER} head info — continuing without PR context"
            exit 0
          }
          if [[ "${STAGE}" == "fix" ]]; then
            HEAD_REPO=$(printf '%s' "${PR_JSON}" | jq -r '.head.repo.full_name')
            BASE_REPO=$(printf '%s' "${PR_JSON}" | jq -r '.base.repo.full_name')
            if [[ "${HEAD_REPO}" != "${BASE_REPO}" ]]; then
              echo "::error::Fork PR detected (head=${HEAD_REPO}, base=${BASE_REPO}) — fix agent blocked"
              exit 1
            fi
          fi
          DELIM="PR_$(openssl rand -hex 8)"
          {
            echo "pr_json<<${DELIM}"
            echo "${PR_JSON}"
            echo "${DELIM}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build event payload
        id: payload
        if: steps.route.outputs.stage != ''
        env:
          PR_HEAD_JSON: ${{ steps.pr-head.outputs.pr_json }}
        run: |
          set -euo pipefail
          EVENT_PAYLOAD=$(jq -c '{
            issue: (.issue // null | if . then {number, html_url} else null end),
            pull_request: (.pull_request // null | if . then {number, html_url,
              head: {ref: .head.ref, sha: .head.sha, repo: {full_name: .head.repo.full_name}},
              base: {ref: .base.ref, repo: {full_name: .base.repo.full_name}}} else null end),
            comment: (.comment // null | if . then {body: .body[:4096]} else null end)
          }' "$GITHUB_EVENT_PATH") || {
            echo "::error::Failed to extract event payload from GITHUB_EVENT_PATH"
            exit 1
          }

          # For issue_comment events on PRs, the raw event has no top-level
          # pull_request with head SHA. Merge the API-fetched PR info.
          if [[ -n "${PR_HEAD_JSON}" ]]; then
            EVENT_PAYLOAD=$(printf '%s' "${EVENT_PAYLOAD}" | jq -c --argjson pr "${PR_HEAD_JSON}" '.pull_request = $pr')
          fi

          if [[ -z "${EVENT_PAYLOAD}" || "${EVENT_PAYLOAD}" == "null" ]]; then
            echo "::error::Event payload is empty after extraction"
            exit 1
          fi
          DELIM="PAYLOAD_$(openssl rand -hex 8)"
          {
            echo "event_payload<<${DELIM}"
            echo "${EVENT_PAYLOAD}"
            echo "${DELIM}"
          } >> "${GITHUB_OUTPUT}"

  triage:
    name: Triage
    needs: route
    if: needs.route.outputs.stage == 'triage'
    runs-on: ${{ inputs.runner_image }}
    concurrency:
      group: fullsend-triage-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      actions: write
      contents: read
      id-token: write
      issues: write

    steps:
      - name: Checkout config repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: ${{ github.event_name == 'pull_request_target' }}

      - name: Checkout upstream defaults
        if: hashFiles('.defaults/action.yml', '.fullsend/.defaults/action.yml') == ''
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .defaults
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/
            .github/scripts/
            internal/scaffold/fullsend-repo/
            action.yml

      - name: Prepare workspace
        id: workspace
        uses: ./.defaults/.github/actions/prepare-workspace
        with:
          install_mode: ${{ inputs.install_mode }}
          source_repo: ${{ github.repository }}

      - name: Mint triage token
        id: app-token
        uses: ./.defaults/.github/actions/mint-token
        with:
          role: triage
          repos: ${{ steps.workspace.outputs.repo_name }}
          mint_url: ${{ inputs.mint_url }}

      - name: Checkout target repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ github.repository }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo
          fetch-depth: 1
          persist-credentials: false

      - name: Setup GCP and prepare credentials
        uses: ./.defaults/.github/actions/setup-gcp
        with:
          gcp_wif_provider: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
          gcp_project_id: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: TRIAGE_
          TRIAGE_TARGET_REPO_DIR: target-repo
          TRIAGE_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          TRIAGE_CLOUD_ML_REGION: ${{ inputs.gcp_region }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Run triage agent
        uses: ./.defaults/
        env:
          GITHUB_ISSUE_URL: ${{ fromJSON(needs.route.outputs.event_payload).issue.html_url }}
          REPO_FULL_NAME: ${{ github.repository }}
          OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_TRACES_ENDPOINT }}
          OTEL_EXPORTER_OTLP_TRACES_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_TRACES_HEADERS }}
          OTEL_RESOURCE_ATTRIBUTES: ${{ vars.OTEL_RESOURCE_ATTRIBUTES }}
        with:
          agent: triage
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}
          version: ${{ inputs.fullsend_version }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          status-repo: ${{ github.repository }}
          status-number: ${{ fromJSON(needs.route.outputs.event_payload).issue.number }}
          mint-url: ${{ inputs.mint_url }}
          pr-head-sha: ${{ fromJSON(needs.route.outputs.event_payload).pull_request.head.sha || '' }}

  code:
    name: Code
    needs: route
    if: needs.route.outputs.stage == 'code'
    runs-on: ${{ inputs.runner_image }}
    concurrency:
      group: fullsend-code-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      actions: write
      contents: write
      id-token: write
      issues: write
      packages: read
      pull-requests: write

    steps:
      - name: Checkout config repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: ${{ github.event_name == 'pull_request_target' }}

      - name: Checkout upstream defaults
        if: hashFiles('.defaults/action.yml', '.fullsend/.defaults/action.yml') == ''
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .defaults
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/
            .github/scripts/
            internal/scaffold/fullsend-repo/
            action.yml

      - name: Prepare workspace
        id: workspace
        uses: ./.defaults/.github/actions/prepare-workspace
        with:
          install_mode: ${{ inputs.install_mode }}
          source_repo: ${{ github.repository }}

      - name: Mint coder token
        id: app-token
        uses: ./.defaults/.github/actions/mint-token
        with:
          role: coder
          repos: ${{ steps.workspace.outputs.repo_name }}
          mint_url: ${{ inputs.mint_url }}

      - name: Checkout target repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ github.repository }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo
          fetch-depth: 0
          persist-credentials: false

      - name: Validate inputs
        id: validate
        env:
          ISSUE_NUMBER: ${{ fromJSON(needs.route.outputs.event_payload).issue.number }}
          REPO_FULL_NAME: ${{ github.repository }}
          GITHUB_ISSUE_URL: ${{ fromJSON(needs.route.outputs.event_payload).issue.html_url }}
          COMMENT_BODY: ${{ fromJSON(needs.route.outputs.event_payload).comment.body }}
          FULLSEND_DIR: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}
        run: bash "${FULLSEND_DIR:+$FULLSEND_DIR/}scripts/pre-code.sh"

      - name: Setup GCP and prepare credentials
        if: steps.validate.outputs.skipped != 'true'
        uses: ./.defaults/.github/actions/setup-gcp
        with:
          gcp_wif_provider: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
          gcp_project_id: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}

      - name: Resolve bot identity
        if: steps.validate.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          read -r BOT_LOGIN BOT_USER_ID < <(
            gh api graphql -f query='{ viewer { login databaseId } }' \
              | jq -r '.data.viewer | "\(.login) \(.databaseId)"'
          )
          GIT_BOT_EMAIL="${BOT_USER_ID}+${BOT_LOGIN}@users.noreply.github.com"
          echo "Resolved bot identity: ${BOT_LOGIN} (${BOT_USER_ID})"
          echo "GIT_BOT_EMAIL=${GIT_BOT_EMAIL}" >> "${GITHUB_ENV}"
          git config --global user.email "${GIT_BOT_EMAIL}"
          git config --global user.name "${BOT_LOGIN}"

      - name: Setup agent environment
        if: steps.validate.outputs.skipped != 'true'
        env:
          AGENT_PREFIX: CODE_
          CODE_TARGET_REPO_DIR: target-repo
          CODE_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          CODE_CLOUD_ML_REGION: ${{ inputs.gcp_region }}
          CODE_ISSUE_NUMBER: ${{ fromJSON(needs.route.outputs.event_payload).issue.number }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Run code agent
        if: steps.validate.outputs.skipped != 'true'
        uses: ./.defaults/
        env:
          GITHUB_ISSUE_URL: ${{ fromJSON(needs.route.outputs.event_payload).issue.html_url }}
          ISSUE_NUMBER: ${{ fromJSON(needs.route.outputs.event_payload).issue.number }}
          REPO_FULL_NAME: ${{ github.repository }}
          CODE_ALLOWED_TARGET_BRANCHES: ''
          TARGET_BRANCH: main
        with:
          agent: code
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}
          version: ${{ inputs.fullsend_version }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          status-repo: ${{ github.repository }}
          status-number: ${{ fromJSON(needs.route.outputs.event_payload).issue.number }}
          mint-url: ${{ inputs.mint_url }}
          pr-head-sha: ${{ fromJSON(needs.route.outputs.event_payload).pull_request.head.sha || '' }}

  review:
    name: Review
    needs: route
    if: needs.route.outputs.stage == 'review'
    runs-on: ${{ inputs.runner_image }}
    concurrency:
      group: fullsend-review-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      actions: write
      contents: read
      id-token: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout config repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: ${{ github.event_name == 'pull_request_target' }}

      - name: Checkout upstream defaults
        if: hashFiles('.defaults/action.yml', '.fullsend/.defaults/action.yml') == ''
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .defaults
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/
            .github/scripts/
            internal/scaffold/fullsend-repo/
            action.yml

      - name: Prepare workspace
        id: workspace
        uses: ./.defaults/.github/actions/prepare-workspace
        with:
          install_mode: ${{ inputs.install_mode }}
          source_repo: ${{ github.repository }}

      - name: Mint review token
        id: app-token
        uses: ./.defaults/.github/actions/mint-token
        with:
          role: review
          repos: ${{ steps.workspace.outputs.repo_name }}
          mint_url: ${{ inputs.mint_url }}

      - name: Checkout target repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ github.repository }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo
          fetch-depth: 1
          persist-credentials: false

      - name: Pre-fetch prior review context
        id: prior-review
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_REPO: ${{ github.repository }}
          PR_NUM: >-
            ${{ fromJSON(needs.route.outputs.event_payload).pull_request.number
             || fromJSON(needs.route.outputs.event_payload).issue.number }}
          ORG_NAME: ${{ github.repository_owner }}
          REVIEW_APP_CLIENT_ID: ${{ vars.FULLSEND_REVIEW_CLIENT_ID }}
          FULLSEND_DIR: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}
        run: bash "${FULLSEND_DIR:+$FULLSEND_DIR/}scripts/pre-fetch-prior-review.sh"

      - name: Setup GCP and prepare credentials
        uses: ./.defaults/.github/actions/setup-gcp
        with:
          gcp_wif_provider: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
          gcp_project_id: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: REVIEW_
          REVIEW_TARGET_REPO_DIR: target-repo
          REVIEW_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          REVIEW_CLOUD_ML_REGION: ${{ inputs.gcp_region }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Run review agent
        uses: ./.defaults/
        env:
          GITHUB_ISSUE_URL: ${{ fromJSON(needs.route.outputs.event_payload).issue.html_url }}
          GITHUB_PR_URL: ${{ fromJSON(needs.route.outputs.event_payload).pull_request.html_url || fromJSON(needs.route.outputs.event_payload).issue.html_url }}
          REPO_FULL_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ fromJSON(needs.route.outputs.event_payload).pull_request.number || fromJSON(needs.route.outputs.event_payload).issue.number }}
          PRIOR_REVIEW_SHA: ${{ steps.prior-review.outputs.prior_sha }}
          PRIOR_REVIEW_FILE: ${{ steps.prior-review.outputs.prior_review_file }}
          PRIOR_REVIEW_PROVENANCE: ${{ steps.prior-review.outputs.prior_review_provenance }}
        with:
          agent: review
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}
          version: ${{ inputs.fullsend_version }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          status-repo: ${{ github.repository }}
          status-number: ${{ fromJSON(needs.route.outputs.event_payload).pull_request.number || fromJSON(needs.route.outputs.event_payload).issue.number }}
          mint-url: ${{ inputs.mint_url }}
          pr-head-sha: ${{ fromJSON(needs.route.outputs.event_payload).pull_request.head.sha || '' }}

  fix:
    name: Fix
    needs: route
    if: needs.route.outputs.stage == 'fix'
    runs-on: ${{ inputs.runner_image }}
    concurrency:
      group: fullsend-fix-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      actions: write
      contents: write
      id-token: write
      issues: write
      packages: read
      pull-requests: write

    steps:
      - name: Checkout config repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: ${{ github.event_name == 'pull_request_target' }}

      - name: Checkout upstream defaults
        if: hashFiles('.defaults/action.yml', '.fullsend/.defaults/action.yml') == ''
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .defaults
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/
            .github/scripts/
            internal/scaffold/fullsend-repo/
            action.yml

      - name: Prepare workspace
        id: workspace
        uses: ./.defaults/.github/actions/prepare-workspace
        with:
          install_mode: ${{ inputs.install_mode }}
          source_repo: ${{ github.repository }}

      - name: Mint coder token
        id: app-token
        uses: ./.defaults/.github/actions/mint-token
        with:
          role: coder
          repos: ${{ steps.workspace.outputs.repo_name }}
          mint_url: ${{ inputs.mint_url }}

      - name: Resolve bot identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          read -r BOT_LOGIN BOT_USER_ID < <(
            gh api graphql -f query='{ viewer { login databaseId } }' \
              | jq -r '.data.viewer | "\(.login) \(.databaseId)"'
          )
          GIT_BOT_EMAIL="${BOT_USER_ID}+${BOT_LOGIN}@users.noreply.github.com"
          echo "Resolved bot identity: ${BOT_LOGIN} (${BOT_USER_ID})"
          echo "GIT_BOT_EMAIL=${GIT_BOT_EMAIL}" >> "${GITHUB_ENV}"
          git config --global user.email "${GIT_BOT_EMAIL}"
          git config --global user.name "${BOT_LOGIN}"

      - name: Block fork PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EVENT_PAYLOAD: ${{ needs.route.outputs.event_payload }}
          SOURCE_REPO: ${{ github.repository }}
          PR_NUM_INPUT: ''
        run: |
          HEAD_REPO="$(echo "${EVENT_PAYLOAD}" | jq -r '.pull_request.head.repo.full_name // empty')"
          BASE_REPO="$(echo "${EVENT_PAYLOAD}" | jq -r '.pull_request.base.repo.full_name // empty')"
          if [[ -n "${HEAD_REPO}" && -n "${BASE_REPO}" && "${HEAD_REPO}" != "${BASE_REPO}" ]]; then
            echo "::error::Fork PRs are not allowed to trigger the fix agent"
            exit 1
          fi
          if [[ -z "${HEAD_REPO}" && -z "${BASE_REPO}" ]]; then
            PR_NUM="$(echo "${EVENT_PAYLOAD}" | jq -r '.issue.number // empty')"
            PR_NUM="${PR_NUM:-${PR_NUM_INPUT:-}}"
            if [[ -n "${PR_NUM}" ]]; then
              IS_FORK="$(gh pr view "${PR_NUM}" --repo "${SOURCE_REPO}" \
                --json isCrossRepository --jq '.isCrossRepository' 2>/dev/null)" || true
              if [[ -z "${IS_FORK}" ]]; then
                echo "::error::Could not determine if PR is from a fork — failing closed"
                exit 1
              fi
              if [[ "${IS_FORK}" == "true" ]]; then
                echo "::error::Fork PRs are not allowed to trigger the fix agent"
                exit 1
              fi
            fi
          fi

      - name: Extract PR number and context
        id: context
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EVENT_PAYLOAD: ${{ needs.route.outputs.event_payload }}
          INPUT_PR_NUMBER: ''
          INPUT_INSTRUCTION: ''
          TRIGGER_SOURCE: ${{ needs.route.outputs.trigger_source }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          PR_NUM="$(echo "${EVENT_PAYLOAD}" | jq -r '.pull_request.number // empty')"
          if [[ -z "${PR_NUM}" ]]; then
            PR_NUM="$(echo "${EVENT_PAYLOAD}" | jq -r '.issue.number // empty')"
          fi
          if [[ -z "${PR_NUM}" && -n "${INPUT_PR_NUMBER}" ]]; then
            PR_NUM="${INPUT_PR_NUMBER}"
          fi
          if [[ -z "${PR_NUM}" || ! "${PR_NUM}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Could not extract valid PR number from event"
            exit 1
          fi
          echo "pr_number=${PR_NUM}" >> "${GITHUB_OUTPUT}"

          HEAD_REF="$(echo "${EVENT_PAYLOAD}" | jq -r '.pull_request.head.ref // empty')"
          BASE_REF="$(echo "${EVENT_PAYLOAD}" | jq -r '.pull_request.base.ref // empty')"
          if [[ -z "${HEAD_REF}" ]]; then
            HEAD_REF="$(gh pr view "${PR_NUM}" --repo "${SOURCE_REPO}" --json headRefName --jq '.headRefName' 2>/dev/null || true)"
          fi
          if [[ -z "${BASE_REF}" ]]; then
            BASE_REF="$(gh pr view "${PR_NUM}" --repo "${SOURCE_REPO}" --json baseRefName --jq '.baseRefName' 2>/dev/null || echo 'main')"
          fi
          if [[ -z "${HEAD_REF}" ]]; then
            echo "::error::Could not resolve PR head branch"
            exit 1
          fi
          echo "head_ref=${HEAD_REF}" >> "${GITHUB_OUTPUT}"
          echo "base_ref=${BASE_REF}" >> "${GITHUB_OUTPUT}"
          echo "PR #${PR_NUM}: ${HEAD_REF} → ${BASE_REF}"

          INSTRUCTION="none"
          if [[ ! "${TRIGGER_SOURCE}" =~ \[bot\]$ ]]; then
            COMMENT_BODY="$(echo "${EVENT_PAYLOAD}" | jq -r '.comment.body // empty')"
            if [[ -n "${COMMENT_BODY}" ]]; then
              INSTRUCTION="${COMMENT_BODY#/fs-fix}"
              INSTRUCTION="${INSTRUCTION#"${INSTRUCTION%%[![:space:]]*}"}"
            fi
            if [[ -z "${INSTRUCTION}" && -n "${INPUT_INSTRUCTION}" ]]; then
              INSTRUCTION="${INPUT_INSTRUCTION}"
            fi
            if [[ -z "${INSTRUCTION}" ]]; then
              INSTRUCTION="none"
            fi
          fi
          DELIM="INSTRUCTION_$(openssl rand -hex 8)"
          {
            echo "instruction<<${DELIM}"
            echo "${INSTRUCTION}"
            echo "${DELIM}"
          } >> "${GITHUB_OUTPUT}"

          FIX_COMMITS="$(gh api "repos/${SOURCE_REPO}/pulls/${PR_NUM}/commits" \
            --paginate 2>/dev/null \
            | jq -s 'add | [.[] | select(.commit.author.name == "fullsend-fix")] | length')" \
            || { echo "::warning::Could not count prior fix commits — defaulting to cap"; FIX_COMMITS="${ITERATION_CAP:-5}"; }
          ITERATION=$(( FIX_COMMITS + 1 ))
          echo "Fix iteration: ${ITERATION} (${FIX_COMMITS} previous fix commits)" >&2
          echo "iteration=${ITERATION}" >> "${GITHUB_OUTPUT}"

      - name: Check fix eligibility
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TRIGGER_SOURCE: ${{ needs.route.outputs.trigger_source }}
          PR_NUM: ${{ steps.context.outputs.pr_number }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          if [[ "${TRIGGER_SOURCE}" =~ \[bot\]$ ]]; then
            PR_INFO=$(gh pr view "${PR_NUM}" --repo "${SOURCE_REPO}" \
              --json labels,author --jq '{labels: [.labels[].name], author: .author.login}') \
              || { echo "::error::Failed to fetch PR info for #${PR_NUM}"; exit 1; }

            HAS_NO_FIX=$(echo "${PR_INFO}" | jq -r '.labels | any(. == "fullsend-no-fix")')
            if [[ "${HAS_NO_FIX}" == "true" ]]; then
              echo "::warning::PR #${PR_NUM} has 'fullsend-no-fix' label — skipping bot-triggered fix"
              exit 1
            fi

            PR_AUTHOR=$(echo "${PR_INFO}" | jq -r '.author')
            if [[ ! "${PR_AUTHOR}" =~ \[bot\]$ ]]; then
              HAS_FIX_LABEL=$(echo "${PR_INFO}" | jq -r '.labels | any(. == "fullsend-fix")')
              if [[ "${HAS_FIX_LABEL}" != "true" ]]; then
                echo "::warning::Human-authored PR #${PR_NUM} without 'fullsend-fix' label — skipping bot-triggered fix"
                exit 1
              fi
            fi
          fi

      - name: Checkout target repository at PR HEAD
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ github.repository }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ steps.context.outputs.head_ref }}

      - name: Record pre-agent HEAD
        id: pre-agent
        working-directory: target-repo
        run: |
          SHA="$(git rev-parse HEAD)"
          echo "Pre-agent HEAD: ${SHA}"
          echo "head=${SHA}" >> "${GITHUB_OUTPUT}"

      - name: Pre-fetch review body
        id: review-body
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_REPO: ${{ github.repository }}
          PR_NUM: ${{ steps.context.outputs.pr_number }}
          TRIGGER_SOURCE: ${{ needs.route.outputs.trigger_source }}
          ORG_NAME: ${{ github.repository_owner }}
        run: |
          REVIEW_FILE="${GITHUB_WORKSPACE}/review-body.txt"
          REVIEW_BOT="${ORG_NAME}-review[bot]"
          gh api "repos/${SOURCE_REPO}/pulls/${PR_NUM}/reviews" \
            --jq "[.[] | select(.state == \"CHANGES_REQUESTED\" and .user.login == \"${REVIEW_BOT}\")] | last | .body // \"\"" \
            > "${REVIEW_FILE}" 2>/dev/null || echo "" > "${REVIEW_FILE}"
          BYTE_COUNT="$(wc -c < "${REVIEW_FILE}")"
          echo "Pre-fetched review body: ${BYTE_COUNT} bytes"
          MAX_REVIEW_BYTES=1048576
          if [[ "${BYTE_COUNT}" -gt "${MAX_REVIEW_BYTES}" ]]; then
            echo "::error::Review body is ${BYTE_COUNT} bytes (max: ${MAX_REVIEW_BYTES})"
            exit 1
          fi
          if [[ "${TRIGGER_SOURCE}" =~ \[bot\]$ && "${BYTE_COUNT}" -le 1 ]]; then
            echo "::error::Bot-triggered run but review body is empty — nothing to fix"
            exit 1
          fi
          echo "review_file=${REVIEW_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Validate inputs
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          REPO_FULL_NAME: ${{ github.repository }}
          TRIGGER_SOURCE: ${{ needs.route.outputs.trigger_source }}
          FIX_ITERATION: ${{ steps.context.outputs.iteration }}
          HUMAN_INSTRUCTION: ${{ steps.context.outputs.instruction }}
          FULLSEND_DIR: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}
        run: bash "${FULLSEND_DIR:+$FULLSEND_DIR/}scripts/pre-fix.sh"

      - name: Setup GCP and prepare credentials
        uses: ./.defaults/.github/actions/setup-gcp
        with:
          gcp_wif_provider: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
          gcp_project_id: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: FIX_
          FIX_TARGET_REPO_DIR: target-repo
          FIX_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          FIX_CLOUD_ML_REGION: ${{ inputs.gcp_region }}
          FIX_PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          FIX_TRIGGER_SOURCE: ${{ needs.route.outputs.trigger_source }}
          FIX_HUMAN_INSTRUCTION: ${{ steps.context.outputs.instruction }}
          FIX_FIX_ITERATION: ${{ steps.context.outputs.iteration }}
          FIX_REPO_FULL_NAME: ${{ github.repository }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Run fix agent
        uses: ./.defaults/
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          REPO_FULL_NAME: ${{ github.repository }}
          TARGET_BRANCH: ${{ steps.context.outputs.base_ref }}
          TRIGGER_SOURCE: ${{ needs.route.outputs.trigger_source }}
          HUMAN_INSTRUCTION: ${{ steps.context.outputs.instruction }}
          FIX_ITERATION: ${{ steps.context.outputs.iteration }}
          REVIEW_BODY_FILE: ${{ steps.review-body.outputs.review_file }}
          PRE_AGENT_HEAD: ${{ steps.pre-agent.outputs.head }}
        with:
          agent: fix
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}
          version: ${{ inputs.fullsend_version }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          status-repo: ${{ github.repository }}
          status-number: ${{ steps.context.outputs.pr_number }}
          mint-url: ${{ inputs.mint_url }}
          pr-head-sha: ${{ fromJSON(needs.route.outputs.event_payload).pull_request.head.sha || '' }}

  retro:
    name: Retro
    needs: route
    if: needs.route.outputs.stage == 'retro'
    runs-on: ${{ inputs.runner_image }}
    concurrency:
      group: fullsend-retro-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      actions: write
      contents: read
      id-token: write
      issues: write

    steps:
      - name: Checkout config repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: ${{ github.event_name == 'pull_request_target' }}

      - name: Checkout upstream defaults
        if: hashFiles('.defaults/action.yml', '.fullsend/.defaults/action.yml') == ''
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .defaults
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/
            .github/scripts/
            internal/scaffold/fullsend-repo/
            action.yml

      - name: Prepare workspace
        id: workspace
        uses: ./.defaults/.github/actions/prepare-workspace
        with:
          install_mode: ${{ inputs.install_mode }}
          source_repo: ${{ github.repository }}

      - name: Mint retro token
        id: app-token
        uses: ./.defaults/.github/actions/mint-token
        with:
          role: retro
          repos: ${{ inputs.install_mode == 'per-repo' && steps.workspace.outputs.repo_name || format('{0},.fullsend', steps.workspace.outputs.repo_name) }}
          mint_url: ${{ inputs.mint_url }}

      - name: Checkout target repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ github.repository }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo
          fetch-depth: 1
          persist-credentials: false

      - name: Setup GCP and prepare credentials
        uses: ./.defaults/.github/actions/setup-gcp
        with:
          gcp_wif_provider: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
          gcp_project_id: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: RETRO_
          RETRO_TARGET_REPO_DIR: target-repo
          RETRO_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          RETRO_CLOUD_ML_REGION: ${{ inputs.gcp_region }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Run retro agent
        uses: ./.defaults/
        env:
          ORIGINATING_URL: ${{ fromJSON(needs.route.outputs.event_payload).pull_request.html_url || fromJSON(needs.route.outputs.event_payload).issue.html_url }}
          RETRO_COMMENT: ${{ fromJSON(needs.route.outputs.event_payload).comment.body || '' }}
          REPO_FULL_NAME: ${{ github.repository }}
          MINT_REPOS: ${{ steps.workspace.outputs.repo_name != '' && (inputs.install_mode == 'per-repo' && steps.workspace.outputs.repo_name || format('{0},.fullsend', steps.workspace.outputs.repo_name)) || '' }}
        with:
          agent: retro
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}
          version: ${{ inputs.fullsend_version }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          status-repo: ${{ github.repository }}
          status-number: ${{ fromJSON(needs.route.outputs.event_payload).pull_request.number || fromJSON(needs.route.outputs.event_payload).issue.number }}
          mint-url: ${{ inputs.mint_url }}
          pr-head-sha: ${{ fromJSON(needs.route.outputs.event_payload).pull_request.head.sha || '' }}

  prioritize:
    name: Prioritize
    needs: route
    if: needs.route.outputs.stage == 'prioritize'
    runs-on: ${{ inputs.runner_image }}
    concurrency:
      group: fullsend-prioritize-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      actions: write
      contents: read
      id-token: write
      issues: write

    steps:
      - name: Checkout config repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: ${{ github.event_name == 'pull_request_target' }}

      - name: Checkout upstream defaults
        if: hashFiles('.defaults/action.yml', '.fullsend/.defaults/action.yml') == ''
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .defaults
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/
            .github/scripts/
            internal/scaffold/fullsend-repo/
            action.yml

      - name: Prepare workspace
        id: workspace
        uses: ./.defaults/.github/actions/prepare-workspace
        with:
          install_mode: ${{ inputs.install_mode }}
          source_repo: ${{ github.repository }}

      - name: Setup GCP and prepare credentials
        uses: ./.defaults/.github/actions/setup-gcp
        with:
          gcp_wif_provider: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
          gcp_project_id: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: PRIORITIZE_
          PRIORITIZE_ORG: ${{ github.repository_owner }}
          PRIORITIZE_PROJECT_NUMBER: ${{ inputs.project_number }}
          PRIORITIZE_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          PRIORITIZE_CLOUD_ML_REGION: ${{ inputs.gcp_region }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Create empty target-repo directory
        run: mkdir -p target-repo

      - name: Run prioritize agent
        uses: ./.defaults/
        env:
          GITHUB_ISSUE_URL: ${{ fromJSON(needs.route.outputs.event_payload).issue.html_url }}
          REPO_FULL_NAME: ${{ github.repository }}
        with:
          agent: prioritize
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}
          version: ${{ inputs.fullsend_version }}
          mint-url: ${{ inputs.mint_url }}

  harness-dispatch:
    name: Harness dispatch
    runs-on: ${{ inputs.runner_image }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      matrix: ${{ steps.dispatch.outputs.matrix }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: ${{ github.event_name == 'pull_request_target' }}
          sparse-checkout: |
            .fullsend/
            .defaults/action.yml
            .defaults/.github/actions/install-fullsend-cli/
            .fullsend/.defaults/action.yml
          sparse-checkout-cone-mode: false

      - name: Detect registered harness triggers
        id: triggers
        shell: bash
        run: |
          set -euo pipefail
          has_triggers=false
          if [[ -f .fullsend/config.yaml ]]; then
            if grep -qE 'source:[[:space:]]*https?://' .fullsend/config.yaml; then
              has_triggers=true
            elif grep -qE '^[[:space:]]*agents:' .fullsend/config.yaml \
              && grep -qE '^[[:space:]]*-[[:space:]]*name:|^[[:space:]]*name:' .fullsend/config.yaml; then
              # Agents are registered; let dispatch enumerate triggers. Skipping only
              # when the config has no agents avoids false negatives from harness path
              # layout while still skipping the CLI install on empty configs.
              has_triggers=true
            fi
          fi
          echo "has_triggers=${has_triggers}" >> "${GITHUB_OUTPUT}"

      - name: Detect dispatch CLI install mode
        id: mode
        if: steps.triggers.outputs.has_triggers == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .defaults/action.yml || -f .fullsend/.defaults/action.yml ]]; then
            echo "mode=vendored" >> "${GITHUB_OUTPUT}"
          else
            echo "mode=upstream" >> "${GITHUB_OUTPUT}"
          fi

      - name: Guard vendored install
        if: steps.triggers.outputs.has_triggers == 'true' && steps.mode.outputs.mode == 'vendored'
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f .fullsend/bin/fullsend ]]; then
            echo "::error::broken --vendor install: vendored marker present but .fullsend/bin/fullsend is missing"
            exit 1
          fi

      - name: Restore fullsend CLI cache
        if: steps.triggers.outputs.has_triggers == 'true'
        id: cli-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/fullsend-cache
          key: fullsend-cli-${{ steps.mode.outputs.mode }}-${{ job.workflow_sha }}

      - name: Install fullsend CLI (vendored defaults)
        if: steps.triggers.outputs.has_triggers == 'true' && steps.mode.outputs.mode == 'vendored' && steps.cli-cache.outputs.cache-hit != 'true'
        uses: ./.defaults/.github/actions/install-fullsend-cli
        with:
          mode: vendored
          vendored_path: .fullsend/bin/fullsend
          github_token: ${{ github.token }}

      - name: Checkout upstream install action
        if: steps.triggers.outputs.has_triggers == 'true' && steps.mode.outputs.mode == 'upstream' && steps.cli-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .workflow-actions
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/install-fullsend-cli/
          sparse-checkout-cone-mode: false

      - name: Install fullsend CLI (upstream workflow)
        if: steps.triggers.outputs.has_triggers == 'true' && steps.mode.outputs.mode == 'upstream' && steps.cli-cache.outputs.cache-hit != 'true'
        uses: ./.workflow-actions/.github/actions/install-fullsend-cli
        with:
          mode: upstream
          workflow_repository: ${{ job.workflow_repository }}
          workflow_sha: ${{ job.workflow_sha }}
          github_token: ${{ github.token }}

      - name: Expose cached fullsend CLI
        if: steps.triggers.outputs.has_triggers == 'true' && steps.cli-cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP}/fullsend"
          mkdir -p "${install_dir}"
          cp "${RUNNER_TEMP}/fullsend-cache/fullsend" "${install_dir}/fullsend"
          chmod +x "${install_dir}/fullsend"
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Prepare fullsend CLI cache artifact
        if: steps.triggers.outputs.has_triggers == 'true' && steps.cli-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/fullsend-cache"
          cp "${RUNNER_TEMP}/fullsend/fullsend" "${RUNNER_TEMP}/fullsend-cache/fullsend"

      - name: Save fullsend CLI cache
        if: steps.triggers.outputs.has_triggers == 'true' && steps.cli-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/fullsend-cache
          key: fullsend-cli-${{ steps.mode.outputs.mode }}-${{ job.workflow_sha }}

      - name: Run fullsend dispatch
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ inputs.event_action }}
        run: |
          set -euo pipefail
          if [[ "${{ steps.triggers.outputs.has_triggers }}" != "true" ]]; then
            echo 'matrix={"include":[]}' >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          MATRIX=$(fullsend dispatch \
            --input-driver gha-event \
            --output-driver gha-matrix \
            --config-dir .fullsend \
            --event-action "${EVENT_ACTION}")
          DELIM="MATRIX_$(openssl rand -hex 8)"
          {
            echo "matrix<<${DELIM}"
            printf '%s' "${MATRIX}"
            echo
            echo "${DELIM}"
          } >> "${GITHUB_OUTPUT}"

  harness-run:
    name: Harness run (${{ matrix.agent }})
    needs: harness-dispatch
    if: ${{ needs.harness-dispatch.outputs.matrix != '' && fromJSON(needs.harness-dispatch.outputs.matrix).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.harness-dispatch.outputs.matrix) }}
    concurrency:
      group: fullsend-harness-${{ matrix.agent }}-${{ github.repository }}-${{ matrix.status_number }}
      cancel-in-progress: true
    runs-on: ${{ inputs.runner_image }}
    permissions:
      actions: write
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout config repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: ${{ github.event_name == 'pull_request_target' }}

      - name: Checkout upstream defaults
        if: hashFiles('.defaults/action.yml', '.fullsend/.defaults/action.yml') == ''
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .defaults
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/
            .github/scripts/
            internal/scaffold/fullsend-repo/
            action.yml

      - name: Prepare workspace (upstream defaults + org/repo overrides)
        env:
          INSTALL_MODE: ${{ inputs.install_mode }}
        run: |
          set -euo pipefail
          if [[ "${INSTALL_MODE}" != "per-org" && "${INSTALL_MODE}" != "per-repo" ]]; then
            printf 'Received install_mode: %q\n' "${INSTALL_MODE}"
            echo "::error::Invalid install_mode: must be 'per-org' or 'per-repo'"
            exit 1
          fi
          SRC=".defaults/internal/scaffold/fullsend-repo"
          LAYERED_DIRS="agents skills schemas harness plugins policies scripts env"
          DEST=""
          if [[ "${INSTALL_MODE}" == "per-repo" ]]; then
            DEST=".fullsend/"
          fi
          for dir in ${LAYERED_DIRS}; do
            if [[ -d "${SRC}/${dir}" ]]; then
              mkdir -p "${DEST}${dir}"
              cp -r "${SRC}/${dir}/." "${DEST}${dir}/"
            fi
          done
          mkdir -p .github/scripts
          cp "${SRC}/.github/scripts/setup-agent-env.sh" .github/scripts/setup-agent-env.sh

      - name: Extract repo metadata
        id: repo-parts
        shell: bash
        env:
          SOURCE_REPO: ${{ matrix.source_repo }}
        run: |
          set -euo pipefail
          NAME="${SOURCE_REPO#*/}"
          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"

      - name: Write dispatch event payload
        shell: bash
        env:
          EVENT_PAYLOAD: ${{ matrix.event_payload }}
        run: |
          set -euo pipefail
          mkdir -p .fullsend/dispatch
          printf '%s' "${EVENT_PAYLOAD}" > .fullsend/dispatch/event-payload.json

      - name: Mint agent token
        id: app-token
        uses: ./.defaults/.github/actions/mint-token
        with:
          role: ${{ matrix.role }}
          repos: ${{ steps.repo-parts.outputs.name }}
          mint_url: ${{ inputs.mint_url }}

      - name: Checkout target repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ matrix.source_repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo
          fetch-depth: 1
          persist-credentials: false

      - name: Setup GCP and prepare credentials
        uses: ./.defaults/.github/actions/setup-gcp
        with:
          gcp_wif_provider: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
          gcp_project_id: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}

      - name: Setup agent environment
        shell: bash
        env:
          MATRIX_ROLE: ${{ matrix.role }}
          GCP_PROJECT: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          GCP_REGION: ${{ inputs.gcp_region }}
        run: |
          set -euo pipefail
          ROLE_UPPER=$(echo "${MATRIX_ROLE}" | tr '[:lower:]' '[:upper:]')
          export AGENT_PREFIX="${ROLE_UPPER}_"
          export "${ROLE_UPPER}_TARGET_REPO_DIR=target-repo"
          export "${ROLE_UPPER}_ANTHROPIC_VERTEX_PROJECT_ID=${GCP_PROJECT}"
          export "${ROLE_UPPER}_CLOUD_ML_REGION=${GCP_REGION}"
          bash .github/scripts/setup-agent-env.sh

      - name: Export dispatch context env
        id: dispatch-env
        shell: bash
        env:
          EVENT_PAYLOAD: ${{ matrix.event_payload }}
        run: |
          set -euo pipefail
          URL=$(printf '%s' "${EVENT_PAYLOAD}" | jq -r '.issue.html_url // .pull_request.html_url // empty')
          if [[ -z "${URL}" ]]; then
            echo "::error::event_payload missing issue or pull_request html_url"
            exit 1
          fi
          DELIM="ISSUE_URL_$(openssl rand -hex 8)"
          {
            echo "issue_url<<${DELIM}"
            printf '%s' "${URL}"
            echo
            echo "${DELIM}"
          } >> "${GITHUB_OUTPUT}"

      - name: Run harness agent
        uses: ./.defaults/
        env:
          GITHUB_ISSUE_URL: ${{ steps.dispatch-env.outputs.issue_url }}
          REPO_FULL_NAME: ${{ matrix.source_repo }}
        with:
          agent: ${{ matrix.agent }}
          version: ${{ inputs.fullsend_version }}
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          status-repo: ${{ matrix.status_repo }}
          status-number: ${{ matrix.status_number }}
          mint-url: ${{ inputs.mint_url }}
