# Reusable retro agent workflow. Called by dispatch workflows via workflow_call.
# Runs in the caller's repo context (secrets, checkout).
#
# Concurrency: agent-scoped cancel-in-progress group (distinct from dispatch/thin
# caller groups so workflow_call parent runs are not cancelled).
name: Retro Agent

on:
  workflow_call:
    inputs:
      event_type:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      event_payload:
        required: true
        type: string
      mint_url:
        required: true
        type: string
      gcp_region:
        required: true
        type: string
      fullsend_version:
        required: false
        type: string
        default: "latest"
      install_mode:
        required: false
        type: string
        default: "per-org"
      fullsend_ai_ref:
        description: "Deprecated: upstream defaults now use job.workflow_sha. Kept for per-org caller compatibility."
        type: string
        required: false
        default: v0
      runner_image:
        description: GitHub Actions runner image for agent jobs.
        type: string
        required: false
        default: "ubuntu-24.04"
    secrets:
      FULLSEND_GCP_WIF_PROVIDER:
        required: true
      FULLSEND_GCP_PROJECT_ID:
        required: true

concurrency:
  group: fullsend-retro-agent-${{ inputs.source_repo }}-${{ fromJSON(inputs.event_payload).pull_request.number || fromJSON(inputs.event_payload).issue.number }}
  cancel-in-progress: true

jobs:
  retro:
    name: Retro
    runs-on: ${{ inputs.runner_image }}
    permissions:
      actions: write
      contents: read
      id-token: write
      issues: write

    steps:
      - name: Checkout config repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # checkout@v7 blocks fork PR checkouts on pull_request_target by default.
          # Safe here: only .fullsend/ config is read, no fork code is executed,
          # and credentials are not persisted.
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
          allow-unsafe-pr-checkout: ${{ github.event_name == 'pull_request_target' }}

      - name: Checkout upstream defaults
        if: hashFiles('.defaults/action.yml', '.fullsend/.defaults/action.yml') == ''
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .defaults
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/
            .github/scripts/
            internal/scaffold/fullsend-repo/
            action.yml

      - name: Prepare workspace (upstream defaults + org/repo overrides)
        env:
          INSTALL_MODE: ${{ inputs.install_mode }}
        run: |
          set -euo pipefail
          if [[ "${INSTALL_MODE}" != "per-org" && "${INSTALL_MODE}" != "per-repo" ]]; then
            printf 'Received install_mode: %q\n' "${INSTALL_MODE}"
            echo "::error::Invalid install_mode: must be 'per-org' or 'per-repo'"
            exit 1
          fi
          SRC=".defaults/internal/scaffold/fullsend-repo"
          LAYERED_DIRS="agents skills schemas harness plugins policies scripts env"
          DEST=""
          if [[ "${INSTALL_MODE}" == "per-repo" ]]; then
            DEST=".fullsend/"
          fi
          for dir in ${LAYERED_DIRS}; do
            if [[ -d "${SRC}/${dir}" ]]; then
              mkdir -p "${DEST}${dir}"
              cp -r "${SRC}/${dir}/." "${DEST}${dir}/"
            fi
          done
          CUSTOM_BASE="customized"
          if [[ "${INSTALL_MODE}" == "per-repo" ]]; then
            CUSTOM_BASE=".fullsend/customized"
          fi
          for dir in ${LAYERED_DIRS}; do
            if [[ -d "${CUSTOM_BASE}/${dir}" ]]; then
              find "${CUSTOM_BASE}/${dir}" -type f ! -name '.gitkeep' -print0 \
                | while IFS= read -r -d '' f; do
                    rel="${f#"${CUSTOM_BASE}"/}"
                    mkdir -p "$(dirname "${DEST}${rel}")"
                    cp "${f}" "${DEST}${rel}"
                  done
            fi
          done
          mkdir -p .github/scripts
          cp "${SRC}/.github/scripts/setup-agent-env.sh" .github/scripts/setup-agent-env.sh


      - name: Validate enrollment and extract repo metadata
        id: repo-parts
        uses: ./.defaults/.github/actions/validate-enrollment
        with:
          source_repo: ${{ inputs.source_repo }}
          install_mode: ${{ inputs.install_mode }}

      - name: Mint retro token
        id: app-token
        uses: ./.defaults/.github/actions/mint-token
        with:
          role: retro
          repos: ${{ inputs.install_mode == 'per-repo' && steps.repo-parts.outputs.name || format('{0},.fullsend', steps.repo-parts.outputs.name) }}
          mint_url: ${{ inputs.mint_url }}

      - name: Checkout target repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ inputs.source_repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: target-repo
          fetch-depth: 1
          persist-credentials: false

      - name: Setup GCP and prepare credentials
        uses: ./.defaults/.github/actions/setup-gcp
        with:
          gcp_wif_provider: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
          gcp_project_id: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: RETRO_
          RETRO_TARGET_REPO_DIR: target-repo
          RETRO_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          RETRO_CLOUD_ML_REGION: ${{ inputs.gcp_region }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Run retro agent
        uses: ./.defaults/
        env:
          ORIGINATING_URL: ${{ fromJSON(inputs.event_payload).pull_request.html_url || fromJSON(inputs.event_payload).issue.html_url }}
          RETRO_COMMENT: ${{ fromJSON(inputs.event_payload).comment.body || '' }}
          REPO_FULL_NAME: ${{ inputs.source_repo }}
          MINT_REPOS: ${{ steps.repo-parts.outputs.name != '' && (inputs.install_mode == 'per-repo' && steps.repo-parts.outputs.name || format('{0},.fullsend', steps.repo-parts.outputs.name)) || '' }}
        with:
          agent: retro
          version: ${{ inputs.fullsend_version }}
          fullsend-dir: ${{ inputs.install_mode == 'per-repo' && '.fullsend' || '' }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          status-repo: ${{ inputs.source_repo }}
          status-number: ${{ fromJSON(inputs.event_payload).pull_request.number || fromJSON(inputs.event_payload).issue.number }}
          mint-url: ${{ inputs.mint_url }}
